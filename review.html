<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Luxury Coffee Reviews</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    html{
      scroll-behavior:smooth;
    }

    body{

      min-height:100vh;

      overflow-x:hidden;

      background:
      linear-gradient(rgba(20,10,5,0.75),rgba(20,10,5,0.75)),
      url("back.jpg");

      background-size:cover;
      background-position:center;
      background-attachment:fixed;

      color:white;

      position:relative;
    }

    img{
      width:100%;
      display:block;
    }

    /* ================= MAIN WRAPPER ================= */

    .main-wrapper{

      width:100%;
      max-width:1300px;

      margin:auto;

      padding:20px;
    }

    /* ================= GLOW EFFECT ================= */

    .circle{

      position:absolute;

      border-radius:50%;

      filter:blur(90px);

      opacity:0.35;

      z-index:0;

      animation:float 6s infinite alternate ease-in-out;
    }

    .circle1{

      width:280px;
      height:280px;

      background:#ffb347;

      top:5%;
      left:-80px;
    }

    .circle2{

      width:320px;
      height:320px;

      background:#ff5e62;

      bottom:0%;
      right:-100px;
    }

    @keyframes float{

      from{
        transform:translateY(0px);
      }

      to{
        transform:translateY(30px);
      }

    }

    /* ================= NAVBAR ================= */

    .navbar{

      width:100%;

  padding:20px 8%;

  display:flex;

  justify-content:space-between;

  align-items:center;

  position:fixed;

  top:0;
  left:0;

  z-index:1000;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(12px);

  border-bottom:1px solid rgba(255,255,255,0.1);

    }

    .logo{

      font-size:30px;

      font-weight:700;

      color:#ffd59e;
    }

    /* ================= DESKTOP NAV ================= */

    .nav-links{

      display:flex;

      align-items:center;

      gap:30px;

      list-style:none;
    }

    .nav-links a{

      text-decoration:none;

      color:white;

      font-size:17px;

      transition:0.3s;
    }

    .nav-links a:hover{

      color:#ffb347;
    }

    /* ================= TOGGLE BUTTON ================= */

    .menu-toggle{

      width:30px;

      height:20px;

      display:none;

      flex-direction:column;

      justify-content:space-between;

      cursor:pointer;

      z-index:2000;
    }

    .menu-toggle span{

      width:100%;

      height:4px;

      background:white;

      border-radius:10px;

      transition:0.4s;
    }

    /* ================= TOGGLE ANIMATION ================= */

    .menu-toggle.active span:nth-child(1){

      transform:rotate(45deg) translate(7px,7px);
    }

    .menu-toggle.active span:nth-child(2){

      opacity:0;
    }

    .menu-toggle.active span:nth-child(3){

      transform:rotate(-45deg) translate(7px,-7px);
    }

    /* ================= REVIEWS SECTION ================= */

    .reviews{

      width:100%;

      margin-top:70px;

      position:relative;

      z-index:2;
    }

    .reviews h2{

      text-align:center;

      font-size:58px;

      margin-bottom:15px;

      color:#ffe6c7;
    }

    .reviews p{

      text-align:center;

      color:rgba(255,255,255,0.82);

      margin-bottom:50px;

      font-size:17px;
    }

    /* ================= REVIEW FORM ================= */

    .review-form{

      width:100%;

      max-width:800px;

      margin:auto;

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(20px);

      border:2px solid rgba(255,183,77,0.35);

      border-radius:30px;

      padding:40px;

      margin-bottom:50px;

      box-shadow:0 12px 40px rgba(0,0,0,0.4);
    }

    /* ================= INPUT GLOW EFFECT ================= */

.review-form input,
.review-form textarea,
.review-form select{

  width:100%;

  padding:16px 18px;

  margin-bottom:22px;

  border:2px solid rgba(255,183,77,0.35);

  outline:none;

  border-radius:16px;

  background:rgba(255,255,255,0.10);

  color:white;

  font-size:15px;

  transition:0.4s ease;

  box-shadow:0 0 0 rgba(0,0,0,0);
}

/* PLACEHOLDER */

.review-form input::placeholder,
.review-form textarea::placeholder{

  color:rgba(255,255,255,0.65);
}

/* FOCUS + HOVER GLOW */

.review-form input:hover,
.review-form textarea:hover,
.review-form select:hover,
.review-form input:focus,
.review-form textarea:focus,
.review-form select:focus{

  border-color:#ffb347;

  background:rgba(255,255,255,0.16);

  box-shadow:
  0 0 10px rgba(255,179,71,0.5),
  0 0 20px rgba(255,94,98,0.3);

  transform:scale(1.01);
}

/* TEXTAREA */

.review-form textarea{
  resize:none;
}

/* SELECT OPTION */

.review-form select option{
  color:black;
}

/* ================= BUTTON GLOW ================= */

.review-form button{

  width:100%;

  padding:16px;

  border:none;

  border-radius:16px;

  background:linear-gradient(
  135deg,
  #ffb347,
  #ff5e62
  );

  color:white;

  font-size:16px;

  font-weight:600;

  cursor:pointer;

  transition:0.4s ease;

  box-shadow:
  0 0 10px rgba(255,179,71,0.3);
}

/* BUTTON HOVER */

.review-form button:hover{

  transform:translateY(-4px) scale(1.02);

  box-shadow:
  0 0 15px rgba(255,179,71,0.7),
  0 0 35px rgba(255,94,98,0.5),
  0 8px 20px rgba(0,0,0,0.35);
}

   

    .review-form select option{
      color:black;
    }

    .review-form textarea{
      resize:none;
    }

    /* ================= REVIEW GRID ================= */

    .review-container{

      display:grid;

      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

      gap:30px;
    }

    .review-form:hover{
 animation:glow 1.5s infinite alternate;
  transform:translateY(-3 px);

  box-shadow:
  0 0 10px rgba(255,179,71,0.4),
  0 0 10px rgba(255,94,98,0.35),
 
}

@keyframes glow{

  from{

    box-shadow:
    0 0 15px #ffb347,
    0 0 30px #ff5e62;
  }

  to{

    box-shadow:
    0 0 25px #ffb347,
    0 0 50px #ff5e62;
  }
}

    /* ================= REVIEW CARD ================= */

    .review-card{

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(18px);

      border:1px solid rgba(255,255,255,0.12);

      border-radius:25px;

      padding:30px;

      text-align:center;

      transition:0.4s;
    }

    .review-card:hover{

      transform:translateY(-10px);
    }

    .review-card img{

      width:90px;
      height:90px;

      border-radius:50%;

      object-fit:cover;

      margin:auto;

      margin-bottom:18px;

      border:4px solid rgba(255,183,77,0.4);
    }

    .review-card h3{

      font-size:24px;

      margin-bottom:10px;

      color:#ffe0b8;
    }

    .stars{

      font-size:22px;

      margin-bottom:15px;

      color:#ffd700;
    }

    .review-card span{

      color:rgba(255,255,255,0.82);

      line-height:1.8;

      font-size:15px;
    }

    /* ================= TABLET ================= */

    @media(max-width:992px){

      .reviews h2{
        font-size:45px;
      }

      .review-form{
        padding:30px;
      }

    }

    /* ================= MOBILE ================= */

    @media(max-width:768px){

      body{

        background-attachment:scroll;
      }

      .main-wrapper{
        padding:12px;
      }

      .navbar{

        padding:15px 18px;

        position:relative;
      }

      .logo{
        font-size:24px;
      }

      /* SHOW TOGGLE ONLY MOBILE */

      .menu-toggle{
        display:flex;
      }

      /* MOBILE MENU */

      .nav-links{

        position:absolute;

        top:80px;
        right:10px;

        width:220px;

        background:rgba(0,0,0,0.92);

        backdrop-filter:blur(18px);

        border:1px solid rgba(255,255,255,0.1);

        border-radius:18px;

        padding:22px;

        flex-direction:column;

        align-items:center;

        gap:20px;

        opacity:0;

        visibility:hidden;

        transform:translateY(-20px);

        transition:0.4s;
      }

      .nav-links.active{

        opacity:1;

        visibility:visible;

        transform:translateY(0);
      }

      .reviews{

        margin-top:35px;
      }

      .reviews h2{
  
        font-size:34px;

        line-height:1.3;
      }

      .reviews p{

        font-size:15px;

        margin-bottom:35px;
      }

      .review-form{

        padding:22px;

        border-radius:22px;
      }

      .review-form input,
      .review-form textarea,
      .review-form select{

        padding:14px;

        font-size:14px;
      }

      .review-form button{

        padding:14px;

        font-size:15px;
      }

      .review-container{

        grid-template-columns:1fr;

        gap:20px;
      }

      .review-card{

        padding:22px;
      }

      .review-card h3{
        font-size:20px;
      }

      .review-card span{
        font-size:14px;
      }

      .circle1{

        width:170px;
        height:170px;

        left:-50px;
      }

      .circle2{

        width:190px;
        height:190px;

        right:-50px;
      }

    }

    /* ================= SMALL MOBILE ================= */

    @media(max-width:480px){

      .navbar{
        padding:14px;
      }

      .logo{
        font-size:20px;
      }

      .nav-links{

        width:190px;

        right:5px;

        padding:18px;
      }

      .reviews h2{
        font-size:28px;
      }

      .reviews p{
        font-size:14px;
      }

      .review-form{
        padding:18px;
      }

      .review-card img{

        width:75px;
        height:75px;
      }

    }

    /* ================= HIDE TOGGLE DESKTOP ================= */

    @media(min-width:769px){

      .menu-toggle{
        display:none;
      }

      .nav-links{

        position:static;

        opacity:1;

        visibility:visible;

        transform:none;

        background:none;

        width:auto;

        padding:0;

        flex-direction:row;
      }

    }

  </style>

</head>

<body>

  <!-- Glow -->

  <div class="circle circle1"></div>
  <div class="circle circle2"></div>

  <!-- Main Wrapper -->

  <div class="main-wrapper">

    <!-- Navbar -->

    <header>

      <nav class="navbar">

        <div class="logo">
          ☕ Fresh Coffee
        </div>

        <!-- Toggle -->

        <div class="menu-toggle" id="menuToggle">

          <span></span>
          <span></span>
          <span></span>

        </div>

        <!-- Nav Links -->

        <ul class="nav-links" id="navLinks">

          <li><a href="index.html">Home</a></li>

          <li><a href="menu.html">Menu</a></li>

          <li><a href="about.html">About</a></li>

          <li><a href="contact.html">Contact</a></li>

          <li><a href="review.html">Review</a></li>

          <li><a href="cart.html">Cart</a></li>

        </ul>

      </nav>

    </header>

    <!-- Reviews Section -->

    <section class="reviews">

      <h2>
        Customer Reviews 💬
      </h2>

      <p>
        What our coffee lovers say about us
      </p>

      <!-- Review Form -->

      <form class="review-form" id="reviewForm">

        <input type="text" id="name" placeholder="Enter Your Name" required>

        <textarea id="message" rows="4" placeholder="Write Your Review" required></textarea>

        <select id="rating" required>

          <option value="">Select Rating</option>

          <option value="⭐">⭐</option>

          <option value="⭐⭐">⭐⭐</option>

          <option value="⭐⭐⭐">⭐⭐⭐</option>

          <option value="⭐⭐⭐⭐">⭐⭐⭐⭐</option>

          <option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐</option>

        </select>

        <button type="submit">
          Submit Review
        </button>

      </form>

      <!-- Review Cards -->

      <div class="review-container" id="reviewContainer">

        <div class="review-card">

          <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="">

          <h3>Sarah</h3>

          <div class="stars">⭐⭐⭐⭐⭐</div>

          <span>
            Best coffee ever! Amazing atmosphere and delicious drinks.
          </span>

        </div>

      </div>

    </section>

  </div>

  <script>

    /* ================= TOGGLE MENU ================= */

    const menuToggle =
    document.getElementById("menuToggle");

    const navLinks =
    document.getElementById("navLinks");

    menuToggle.addEventListener("click",()=>{

      menuToggle.classList.toggle("active");

      navLinks.classList.toggle("active");

    });

    /* ================= REVIEW FORM ================= */

    const reviewForm =
    document.getElementById('reviewForm');

    const reviewContainer =
    document.getElementById('reviewContainer');

    reviewForm.addEventListener('submit', function(e){

      e.preventDefault();

      const name =
      document.getElementById('name').value;

      const message =
      document.getElementById('message').value;

      const rating =
      document.getElementById('rating').value;

      const randomNumber =
      Math.floor(Math.random() * 90);

      const gender =
      Math.random() > 0.5 ? "men" : "women";

      const reviewCard =
      document.createElement('div');

      reviewCard.classList.add('review-card');

      reviewCard.innerHTML = `

        <img src="" alt="">

        <h3>${name}</h3>

        <div class="stars">${rating}</div>

        <span>${message}</span>

      `;

      reviewContainer.prepend(reviewCard);

      reviewForm.reset();

    });

  </script>

</body>
</html>
