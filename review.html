<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Luxury Coffee Reviews</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    html{
      scroll-behavior:smooth;
    }

    body{

      width:100%;
      min-height:100vh;

      overflow-x:hidden;

      position:relative;

      background:
      linear-gradient(rgba(20,10,5,0.78),rgba(20,10,5,0.82)),
      url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1600&auto=format&fit=crop');

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:scroll;

      color:white;
    }

    img{
      width:100%;
      display:block;
    }

    /* ================= MAIN WRAPPER ================= */

    .main-wrapper{

      width:100%;
      max-width:1300px;

      margin:auto;

      padding:20px;
    }

    /* ================= GLOW BACKGROUND ================= */

    .circle{

      position:absolute;

      border-radius:50%;

      filter:blur(90px);

      opacity:0.35;

      z-index:0;

      animation:float 6s infinite alternate ease-in-out;
    }

    .circle1{

      width:280px;
      height:280px;

      background:#ffb347;

      top:5%;
      left:-80px;
    }

    .circle2{

      width:320px;
      height:320px;

      background:#ff5e62;

      bottom:0%;
      right:-100px;
    }

    @keyframes float{

      from{
        transform:translateY(0px);
      }

      to{
        transform:translateY(30px);
      }

    }

    /* ================= NAVBAR ================= */

    .navbar{

      width:100%;

      display:flex;

      justify-content:space-between;

      align-items:center;

      padding:18px 25px;

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(18px);

      border:1px solid rgba(255,255,255,0.12);

      border-radius:22px;

      position:sticky;

      top:10px;

      z-index:1000;

      box-shadow:0 8px 25px rgba(0,0,0,0.35);
    }

    .logo{

      font-size:30px;

      font-weight:700;

      color:#ffd59e;
    }

    /* ================= TOGGLE BUTTON ================= */

    .menu-toggle{

      width:42px;

      height:32px;

      display:none;

      flex-direction:column;

      justify-content:space-between;

      cursor:pointer;

      z-index:2000;
    }

    .menu-toggle span{

      width:100%;

      height:4px;

      background:white;

      border-radius:10px;

      transition:0.4s;
    }

    /* TOGGLE ANIMATION */

    .menu-toggle.active span:nth-child(1){

      transform:rotate(45deg) translate(7px,7px);
    }

    .menu-toggle.active span:nth-child(2){

      opacity:0;
    }

    .menu-toggle.active span:nth-child(3){

      transform:rotate(-45deg) translate(7px,-7px);
    }

    /* ================= DESKTOP NAV LINKS ================= */

    .nav-links{

      display:flex;

      align-items:center;

      list-style:none;

      gap:30px;
    }

    .nav-links a{

      text-decoration:none;

      color:white;

      font-size:17px;

      transition:0.3s;
    }

    .nav-links a:hover{

      color:#ffb347;
    }

    /* ================= MAIN SECTION ================= */

    .reviews{

      width:100%;

      margin-top:50px;

      position:relative;

      z-index:2;
    }

    .reviews h2{

      text-align:center;

      font-size:58px;

      margin-bottom:15px;

      color:#ffe6c7;
    }

    .reviews p{

      text-align:center;

      color:rgba(255,255,255,0.82);

      margin-bottom:55px;

      font-size:17px;
    }

    /* ================= REVIEW FORM ================= */

    .review-form{

      width:100%;

      background:linear-gradient(
      135deg,
      rgba(255,183,77,0.15),
      rgba(255,94,98,0.10),
      rgba(255,255,255,0.08)
      );

      backdrop-filter:blur(20px);

      border:1px solid rgba(255,255,255,0.12);

      border-radius:32px;

      padding:40px;

      margin-bottom:60px;

      box-shadow:0 12px 40px rgba(0,0,0,0.4);

      overflow:hidden;
    }

    .review-form input,
    .review-form textarea,
    .review-form select{

      width:100%;

      padding:16px 18px;

      margin-bottom:22px;

      border:2px solid rgba(255,183,77,0.45);

      outline:none;

      border-radius:16px;

      background:rgba(255,255,255,0.12);

      color:white;

      font-size:15px;

      transition:0.3s;
    }

    .review-form input::placeholder,
    .review-form textarea::placeholder{

      color:rgba(255,255,255,0.65);
    }

    .review-form textarea{
      resize:none;
    }

    .review-form select option{
      color:black;
    }

    .review-form input:focus,
    .review-form textarea:focus,
    .review-form select:focus{

      background:rgba(255,255,255,0.18);

      border:2px solid #ffb347;

      box-shadow:0 0 18px rgba(255,183,77,0.45);
    }

    /* ================= BUTTON ================= */

    .review-form button{

      width:100%;

      padding:16px;

      border:none;

      border-radius:16px;

      background:linear-gradient(
      135deg,
      #ffb347,
      #ff5e62
      );

      color:white;

      font-size:16px;

      font-weight:600;

      cursor:pointer;

      transition:0.4s;
    }

    .review-form button:hover{

      transform:translateY(-4px);

      box-shadow:0 6px 20px rgba(255,94,98,0.45);
    }

    /* ================= REVIEW GRID ================= */

    .review-container{

      display:grid;

      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

      gap:30px;
    }

    /* ================= REVIEW CARD ================= */

    .review-card{

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(18px);

      border:1px solid rgba(255,255,255,0.12);

      border-radius:28px;

      padding:30px;

      text-align:center;

      transition:0.4s;

      box-shadow:0 10px 30px rgba(0,0,0,0.35);
    }

    .review-card:hover{

      transform:translateY(-10px);
    }

    .review-card img{

      width:90px;

      height:90px;

      border-radius:50%;

      object-fit:cover;

      margin:auto;

      margin-bottom:20px;

      border:4px solid rgba(255,183,77,0.4);
    }

    .review-card h3{

      font-size:24px;

      margin-bottom:10px;

      color:#ffe0b8;
    }

    .stars{

      font-size:22px;

      margin-bottom:15px;

      color:#ffd700;
    }

    .review-card span{

      color:rgba(255,255,255,0.82);

      line-height:1.8;

      font-size:15px;
    }

    /* ================= TABLET ================= */

    @media(max-width:992px){

      .reviews h2{
        font-size:46px;
      }

      .review-form{
        padding:30px;
      }

    }

    /* ================= MOBILE ================= */

    @media(max-width:768px){

      body{
        padding:10px;
      }

      .main-wrapper{
        padding:10px;
      }

      .navbar{

        padding:15px 18px;

        position:relative;
      }

      .logo{
        font-size:24px;
      }

      /* SHOW TOGGLE ONLY MOBILE */

      .menu-toggle{
        display:flex;
      }

      /* MOBILE MENU */

      .nav-links{

        position:absolute;

        top:80px;
        right:0;

        width:220px;

        background:rgba(0,0,0,0.92);

        backdrop-filter:blur(18px);

        border:1px solid rgba(255,255,255,0.1);

        border-radius:18px;

        padding:22px;

        flex-direction:column;

        align-items:center;

        gap:22px;

        opacity:0;

        visibility:hidden;

        transform:translateY(-20px);

        transition:0.4s;
      }

      .nav-links.active{

        opacity:1;

        visibility:visible;

        transform:translateY(0);
      }

      .nav-links a{
        font-size:16px;
      }

      .reviews{

        margin-top:35px;
      }

      .reviews h2{

        font-size:34px;

        line-height:1.3;
      }

      .reviews p{

        font-size:15px;

        margin-bottom:35px;
      }

      .review-form{

        padding:20px;

        border-radius:22px;
      }

      .review-form input,
      .review-form textarea,
      .review-form select{

        padding:14px;

        font-size:14px;
      }

      .review-form button{

        padding:14px;

        font-size:15px;
      }

      .review-container{

        grid-template-columns:1fr;

        gap:20px;
      }

      .review-card{

        padding:22px;

        border-radius:22px;
      }

      .review-card h3{
        font-size:20px;
      }

      .stars{
        font-size:20px;
      }

      .review-card span{
        font-size:14px;
      }

      .circle1{

        width:180px;
        height:180px;

        left:-60px;
      }

      .circle2{

        width:200px;
        height:200px;

        right:-60px;
      }

    }

    /* ================= SMALL MOBILE ================= */

    @media(max-width:480px){

      .navbar{
        padding:14px;
      }

      .logo{
        font-size:20px;
      }

      .nav-links{

        width:190px;

        padding:18px;
      }

      .reviews h2{
        font-size:28px;
      }

      .reviews p{
        font-size:14px;
      }

      .review-form{
        padding:18px;
      }

      .review-card img{

        width:75px;
        height:75px;
      }

    }

    /* ================= HIDE TOGGLE IN DESKTOP ================= */

    @media(min-width:769px){

      .menu-toggle{
        display:none;
      }

      .nav-links{

        position:static;

        width:auto;

        background:none;

        padding:0;

        opacity:1;

        visibility:visible;

        transform:none;

        flex-direction:row;
      }

    }

  </style>

</head>

<body>

  <!-- Glow -->

  <div class="circle circle1"></div>
  <div class="circle circle2"></div>

  <!-- Main Wrapper -->

  <div class="main-wrapper">

    <!-- Navbar -->

    <header>

      <nav class="navbar">

        <div class="logo">
          ☕ Fresh Coffee
        </div>

        <!-- Toggle -->

        <div class="menu-toggle" id="menuToggle">

          <span></span>
          <span></span>
          <span></span>

        </div>

        <!-- Nav Links -->

        <ul class="nav-links" id="navLinks">

          <li><a href="index.html">Home</a></li>

          <li><a href="menu.html">Menu</a></li>

          <li><a href="about.html">About</a></li>

          <li><a href="contact.html">Contact</a></li>

          <li><a href="review.html">Review</a></li>

        </ul>

      </nav>

    </header>

    <!-- Reviews -->

    <section class="reviews">

      <h2>
        Customer Reviews 💬
      </h2>

      <p>
        What our coffee lovers say about us
      </p>

      <!-- Review Form -->

      <form class="review-form" id="reviewForm">

        <input type="text" id="name" placeholder="Enter Your Name" required>

        <textarea id="message" rows="4" placeholder="Write Your Review" required></textarea>

        <select id="rating" required>

          <option value="">Select Rating</option>

          <option value="⭐">⭐</option>

          <option value="⭐⭐">⭐⭐</option>

          <option value="⭐⭐⭐">⭐⭐⭐</option>

          <option value="⭐⭐⭐⭐">⭐⭐⭐⭐</option>

          <option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐</option>

        </select>

        <button type="submit">
          Submit Review
        </button>

      </form>

      <!-- Review Cards -->

      <div class="review-container" id="reviewContainer">

        <div class="review-card">

          <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="">

          <h3>Sarah</h3>

          <div class="stars">⭐⭐⭐⭐⭐</div>

          <span>
            Best coffee ever! Amazing atmosphere and delicious drinks.
          </span>

        </div>

      </div>

    </section>

  </div>

  <script>

    /* ================= TOGGLE MENU ================= */

    const menuToggle =
    document.getElementById("menuToggle");

    const navLinks =
    document.getElementById("navLinks");

    menuToggle.addEventListener("click",()=>{

      menuToggle.classList.toggle("active");

      navLinks.classList.toggle("active");

    });

    /* ================= REVIEW FORM ================= */

    const reviewForm =
    document.getElementById('reviewForm');

    const reviewContainer =
    document.getElementById('reviewContainer');

    reviewForm.addEventListener('submit', function(e){

      e.preventDefault();

      const name =
      document.getElementById('name').value;

      const message =
      document.getElementById('message').value;

      const rating =
      document.getElementById('rating').value;

      const randomNumber =
      Math.floor(Math.random() * 90);

      const gender =
      Math.random() > 0.5 ? "men" : "women";

      const reviewCard =
      document.createElement('div');

      reviewCard.classList.add('review-card');

      reviewCard.innerHTML = `

        <img src="https://randomuser.me/api/portraits/${gender}/${randomNumber}.jpg" alt="">

        <h3>${name}</h3>

        <div class="stars">${rating}</div>

        <span>${message}</span>

      `;

      reviewContainer.prepend(reviewCard);

      reviewForm.reset();

    });

  </script>

</body>
</html>
