<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fresh Coffee - Contact</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
      display:flex;
      flex-direction:column;

      /* UNIQUE DARK COFFEE THEME */

      background:
      linear-gradient(rgba(20,10,5,0.75),rgba(20,10,5,0.75)),
      url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1600&auto=format&fit=crop');

      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    /* ================= NAVBAR ================= */

    .navbar{
      width:100%;
      padding:20px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;

      background:rgba(0,0,0,0.35);
      backdrop-filter:blur(12px);

      border-bottom:1px solid rgba(255,255,255,0.1);

      position:sticky;
      top:0;
      z-index:1000;
    }

    .logo{
      font-size:30px;
      font-weight:bold;
      color:#f8d9b6;
    }

    .nav-links{
      display:flex;
      list-style:none;
      gap:30px;
      flex-wrap:wrap;
    }

    .nav-links a{
      text-decoration:none;
      color:white;
      font-size:17px;
      transition:0.3s;
      font-weight:500;
    }

    .nav-links a:hover{
      color:#f8d9b6;
    }

    /* ================= GLOW EFFECT ================= */

    .circle{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:0.4;
      z-index:0;
      animation:float 5s infinite alternate ease-in-out;
    }

    .circle1{
      width:250px;
      height:250px;
      background:#ff8c42;
      top:5%;
      left:5%;
    }

    .circle2{
      width:300px;
      height:300px;
      background:#c084fc;
      bottom:5%;
      right:5%;
    }

    @keyframes float{
      from{
        transform:translateY(0px);
      }
      to{
        transform:translateY(30px);
      }
    }

    /* ================= MAIN CONTENT ================= */

    .main-content{
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:60px 20px;
      position:relative;
      z-index:2;
    }

    /* ================= FORM ================= */

    .form-container{
      width:100%;
      max-width:450px;

      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(14px);

      border:1px solid rgba(255,255,255,0.12);

      border-radius:28px;

      padding:35px;

      box-shadow:0 10px 40px rgba(0,0,0,0.35);

      color:white;
    }

    .form-container h2{
      text-align:center;
      margin-bottom:25px;
      font-size:34px;
      color:#ffe0c2;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box input,
    .input-box textarea{
      width:100%;
      padding:15px;

      border:none;
      outline:none;

      border-radius:14px;

      background:rgba(255,255,255,0.12);

      color:white;
      font-size:15px;

      transition:0.3s;
    }

    .input-box input:focus,
    .input-box textarea:focus{
      background:rgba(255,255,255,0.18);
      transform:scale(1.01);
    }

    .input-box input::placeholder,
    .input-box textarea::placeholder{
      color:rgba(255,255,255,0.7);
    }

    .input-box textarea{
      resize:none;
    }

    /* ================= BUTTON ================= */

    .submit-btn{
      width:100%;
      padding:15px;

      border:none;
      border-radius:14px;

      background:linear-gradient(135deg,#ff8c42,#ff4d6d);

      color:white;

      font-size:16px;
      font-weight:bold;

      cursor:pointer;
      transition:0.3s;
    }

    .submit-btn:hover{
      transform:translateY(-3px);
      box-shadow:0 8px 25px rgba(0,0,0,0.4);
    }

    .message{
      margin-top:15px;
      text-align:center;
      font-size:14px;
      color:#ffe0c2;
    }

    /* ================= FOOTER ================= */

    .footer{
      width:100%;
      padding:18px;
      text-align:center;

      background:rgba(0,0,0,0.35);
      backdrop-filter:blur(12px);

      border-top:1px solid rgba(255,255,255,0.1);

      color:white;

      position:relative;
      z-index:2;
    }

    /* ================= MOBILE RESPONSIVE ================= */

    @media(max-width:768px){

      body{
        background-attachment:scroll;
      }

      .navbar{
        padding:15px;
        flex-direction:column;
        gap:15px;
      }

      .logo{
        font-size:26px;
      }

      .nav-links{
        gap:18px;
        justify-content:center;
      }

      .nav-links a{
        font-size:15px;
      }

      .main-content{
        padding:40px 15px;
      }

      .form-container{
        padding:25px 20px;
        border-radius:22px;
      }

      .form-container h2{
        font-size:28px;
      }

      .input-box input,
      .input-box textarea{
        padding:13px;
        font-size:14px;
      }

      .submit-btn{
        padding:13px;
        font-size:15px;
      }

      .circle1{
        width:150px;
        height:150px;
        left:-50px;
      }

      .circle2{
        width:180px;
        height:180px;
        right:-50px;
      }

    }

    /* ================= SMALL MOBILE ================= */

    @media(max-width:480px){

      .navbar{
        padding:12px;
      }

      .logo{
        font-size:22px;
      }

      .nav-links{
        gap:12px;
      }

      .nav-links a{
        font-size:14px;
      }

      .form-container h2{
        font-size:24px;
      }

      .form-container{
        padding:20px 15px;
      }

    }

  </style>
</head>

<body>

  <!-- GLOW -->

  <div class="circle circle1"></div>
  <div class="circle circle2"></div>

  <!-- NAVBAR -->

  <header>

    <nav class="navbar">

      <div class="logo">
        ☕ Fresh Coffee
      </div>

      <ul class="nav-links">

        <li><a href="index.html">Home</a></li>

        <li><a href="menu.html">Menu</a></li>

        <li><a href="about.html">About</a></li>

        <li><a href="contact.html">Contact</a></li>

        <li><a href="review.html">Review</a></li>

      </ul>

    </nav>

  </header>

  <!-- MAIN -->

  <div class="main-content">

    <div class="form-container">

      <h2>Contact Us</h2>

      <form id="myForm">

        <div class="input-box">
          <input type="text" id="name" placeholder="Enter your name" required>
        </div>

        <div class="input-box">
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
          <textarea id="message" rows="4" placeholder="Write your message" required></textarea>
        </div>

        <button type="submit" class="submit-btn">
          Send Message
        </button>

        <div class="message" id="successMessage"></div>

      </form>

    </div>

  </div>

  <!-- FOOTER -->

  <footer class="footer">

    © 2026 Fresh Coffee. All rights reserved.

  </footer>

  <script>

    const form = document.getElementById('myForm');

    const successMessage =
    document.getElementById('successMessage');

    form.addEventListener('submit', function(event){

      event.preventDefault();

      const name =
      document.getElementById('name').value;

      successMessage.innerHTML =
      `✨ Thank you, ${name}! Your message has been sent successfully.`;

      form.reset();

    });

  </script>

</body>
</html>
