<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Fresh Coffee - Contact</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    html,
    body{
      width:100%;
      overflow-x:hidden;
    }

    body{

      min-height:100vh;

      position:relative;

      display:flex;
      flex-direction:column;

      background:
      linear-gradient(rgba(20,10,5,0.75),rgba(20,10,5,0.75)),
      url("back.jpg");

      background-size:cover;
      background-position:center;
      background-attachment:fixed;

      color:white;
    }

    img{
      max-width:100%;
      display:block;
    }

    /* ================= NAVBAR ================= */

    .navbar{

  width:100%;

  padding:20px 8%;

  display:flex;

  justify-content:space-between;

  align-items:center;

  position:fixed;

  top:0;
  left:0;

  z-index:1000;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(12px);

  border-bottom:1px solid rgba(255,255,255,0.1);
}

    .logo{

      font-size:30px;

      font-weight:bold;

      color:#f8d9b6;
    }

    /* ================= NAV LINKS DESKTOP ================= */

    .nav-links{

  display:flex;

  align-items:center;

  gap:30px;

  list-style:none;
}


    .nav-links a{

      text-decoration:none;

      color:white;

      font-size:17px;

      font-weight:500;

      transition:0.3s;
    }

    .nav-links a:hover{
      color:#f8d9b6;
    }

    /* ================= TOGGLE BUTTON ================= */

    .menu-toggle{

      width:30px;

      height:20px;

      display:none;

      flex-direction:column;

      justify-content:space-between;

      cursor:pointer;

      z-index:2000;
    }

    .menu-toggle span{

      width:100%;

      height:4px;

      background:white;

      border-radius:10px;

      transition:0.4s;
    }

    /* TOGGLE ANIMATION */

    .menu-toggle.active span:nth-child(1){

      transform:
      rotate(45deg)
      translate(8px,8px);
    }

    .menu-toggle.active span:nth-child(2){

      opacity:0;
    }

    .menu-toggle.active span:nth-child(3){

      transform:
      rotate(-45deg)
      translate(7px,-7px);
    }

    /* ================= GLOW EFFECT ================= */

    .circle{

      position:absolute;

      border-radius:50%;

      filter:blur(80px);

      opacity:0.4;

      z-index:0;

      animation:float 5s infinite alternate ease-in-out;
    }

    .circle1{

      width:250px;

      height:250px;

      background:#ff8c42;

      top:5%;

      left:5%;
    }

    .circle2{

      width:300px;

      height:300px;

      background:#c084fc;

      bottom:5%;

      right:5%;
    }

    @keyframes float{

      from{
        transform:translateY(0px);
      }

      to{
        transform:translateY(30px);
      }

    }

    /* ================= MAIN CONTENT ================= */

    .main-content{

      flex:1;

      display:flex;
      margin-top: 70px;

      justify-content:center;

      align-items:center;

      padding:60px 20px;

      position:relative;

      z-index:2;
    }

    /* ================= FORM ================= */

    .form-container{

      width:100%;

      max-width:500px;

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(14px);

      border:2px solid rgba(255,183,77,0.35);

      border-radius:28px;

      padding:35px;

      box-shadow:0 10px 40px rgba(0,0,0,0.35);
    }

    .form-container h2{

      text-align:center;

      margin-bottom:25px;

      font-size:34px;

      color:#ffe0c2;
    }

    .form-container:hover{
        transform:translateY(-8px);

  box-shadow:
  0 0 20px rgba(255,179,71,0.35),
  0 0 40px rgba(255,94,98,0.25),
  0 12px 40px rgba(0,0,0,0.45);
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box input,
    .input-box textarea{

      width:100%;

      padding:15px;

      border:2px solid rgba(255,183,77,0.35);

      outline:none;

      border-radius:14px;

      background:rgba(255,255,255,0.12);

      color:white;

      font-size:15px;

      transition:0.3s;
    }

    .input-box input:focus,
    .input-box textarea:focus{

      background:rgba(255,255,255,0.18);

      border-color:#ffb347;

      box-shadow:0 0 12px rgba(255,179,71,0.4);

      transform:scale(1.01);
    }

    .input-box input::placeholder,
    .input-box textarea::placeholder{

      color:rgba(255,255,255,0.7);
    }

    .input-box textarea{
      resize:none;
    }
    .input-box input:hover,
    .input-box textarea{
        transform:translateY(-8px);

  box-shadow:
  0 0 20px rgba(255,179,71,0.35),
  0 0 40px rgba(255,94,98,0.25),
  0 12px 40px rgba(0,0,0,0.45);
    }

    /* ================= BUTTON ================= */

    .submit-btn{

      width:100%;

      padding:15px;

      border:none;

      border-radius:14px;

      background:linear-gradient(135deg,#ff8c42,#ff4d6d);

      color:white;

      font-size:16px;

      font-weight:bold;

      cursor:pointer;

      transition:0.3s;
    }

    .submit-btn:hover{

        transform:translateY(-4px) scale(1.02);

  box-shadow:
  0 0 15px rgba(255,179,71,0.7),
  0 0 35px rgba(255,94,98,0.5),
  0 8px 20px rgba(0,0,0,0.35);
    }

    .message{

      margin-top:15px;

      text-align:center;

      font-size:14px;

      color:#ffe0c2;

      line-height:1.5;
    }

    /* ================= FOOTER ================= */

    .footer{
      width:100%;
      text-align:center;
      padding:25px;
      margin-top:40px;
      color:rgba(255,255,255,0.7);
    }

    /* ================= MOBILE ================= */

    @media(max-width:768px){

      body{
        background-attachment:scroll;
      }

      .navbar{

        padding:15px 20px;
      }

      .logo{
        font-size:24px;
      }

      /* SHOW TOGGLE ONLY IN MOBILE */

      .menu-toggle{
        display:flex;
      }

      /* MOBILE MENU */

     .nav-links{

    position:absolute;

    top:80px;

    right:20px;

    width:220px;

    background:rgba(0,0,0,0.92);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:20px;

    padding:25px;

    flex-direction:column;

    gap:20px;

    text-align:center;

    opacity:0;

    visibility:hidden;

    transform:translateY(-20px);

    transition:0.4s;
  }

      .nav-links.active{

    opacity:1;

    visibility:visible;

    transform:translateY(0px);
  }

      .nav-links a{
        font-size:16px;
      }

      .main-content{
        padding:40px 15px;
      }

      .form-container{

        padding:25px 20px;

        border-radius:22px;
      }

      .form-container h2{
        font-size:28px;
      }

      .circle1{

        width:150px;

        height:150px;

        left:-50px;
      }

      .circle2{

        width:180px;

        height:180px;

        right:-50px;
      }

    }

    /* ================= SMALL MOBILE ================= */

    @media(max-width:480px){

      .logo{
        font-size:22px;
      }

      .form-container{
        padding:20px 15px;
      }

      .form-container h2{
        font-size:24px;
      }

      .input-box input,
      .input-box textarea{

        font-size:13px;

        padding:12px;
      }

      .submit-btn{

        font-size:14px;

        padding:12px;
      }

    }

  </style>

</head>

<body>

  <!-- GLOW -->

  <div class="circle circle1"></div>

  <div class="circle circle2"></div>

  <!-- NAVBAR -->

  <header>

    <nav class="navbar">

      <!-- Logo -->

      <div class="logo">
        ☕ Fresh Coffee
      </div>

      <!-- Toggle Button -->

      <div class="menu-toggle" id="menuToggle">

        <span></span>
        <span></span>
        <span></span>

      </div>

      <!-- Nav Links -->

      <ul class="nav-links" id="navLinks">

        <li><a href="index.html">Home</a></li>

        <li><a href="menu.html">Menu</a></li>

        <li><a href="about.html">About</a></li>

        <li><a href="contact.html">Contact</a></li>

        <li><a href="review.html">Review</a></li>

        <li><a href="cart.html">Cart</a></li>

      </ul>

    </nav>

  </header>

  <!-- MAIN -->

  <div class="main-content">

    <div class="form-container">

      <h2>Contact Us</h2>

      <form id="myForm">

        <div class="input-box">

          <input
          type="text"
          id="name"
          placeholder="Enter your name"
          required>

        </div>

        <div class="input-box">

          <input
          type="email"
          id="email"
          placeholder="Enter your email"
          required>

        </div>

        <div class="input-box">

          <textarea
          id="message"
          rows="4"
          placeholder="Write your message"
          required></textarea>

        </div>

        <button
        type="submit"
        class="submit-btn">

          Send Message

        </button>

        <div
        class="message"
        id="successMessage"></div>

      </form>

    </div>

  </div>

  <!-- FOOTER -->

  <footer class="footer">

    © 2026 Fresh Coffee. All rights reserved.

  </footer>

  <!-- JAVASCRIPT -->

  <script>

    /* ================= TOGGLE MENU ================= */

    const menuToggle =
    document.getElementById("menuToggle");

    const navLinks =
    document.getElementById("navLinks");

    menuToggle.addEventListener("click", () => {

      menuToggle.classList.toggle("active");

      navLinks.classList.toggle("active");

    });

    /* ================= CONTACT FORM ================= */

    const form =
    document.getElementById('myForm');

    const successMessage =
    document.getElementById('successMessage');

    form.addEventListener('submit', function(event){

      event.preventDefault();

      const name =
      document.getElementById('name').value;

      successMessage.innerHTML =
      `✨ Thank you, ${name}! Your message has been sent successfully.`;

      form.reset();

    });

  </script>

</body>
</html>
