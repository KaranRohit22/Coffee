<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Contact Form</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      min-height: 100vh;
      background: linear-gradient(135deg,#6a11cb,#2575fc);
      overflow-x: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ================= NAVBAR ================= */

    .navbar{
      width: 100%;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    .navbar img{
      width: 90px;
      height: auto;
    }

    /* ================= MENU ================= */

    .menu-toggle{
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .menu-toggle .bar{
      width: 28px;
      height: 3px;
      background: white;
      border-radius: 5px;
      transition: 0.3s;
    }

    nav{
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
    }

    .nav-links{
      display: none;
      flex-direction: column;
      gap: 18px;
      list-style: none;
      padding: 20px 40px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .nav-links.active{
      display: flex;
    }

    .nav-links li a{
      color: white;
      text-decoration: none;
      font-size: 17px;
      transition: 0.3s;
    }

    .nav-links li a:hover{
      color: #00ffd5;
    }

    /* ================= BACKGROUND CIRCLES ================= */

    .background-circle{
      position: absolute;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.5;
      animation: float 6s infinite alternate ease-in-out;
      z-index: 0;
    }

    .circle1{
      width: 250px;
      height: 250px;
      background: #ff4ecd;
      top: 10%;
      left: 10%;
    }

    .circle2{
      width: 300px;
      height: 300px;
      background: #00ffd5;
      bottom: 10%;
      right: 10%;
    }

    @keyframes float{
      from{
        transform: translateY(0px);
      }
      to{
        transform: translateY(30px);
      }
    }

    /* ================= MAIN CONTENT ================= */

    .main-content{
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 130px 20px 50px;
      position: relative;
      z-index: 2;
    }

    /* ================= FORM ================= */

    .form-container{
      width: 100%;
      max-width: 420px;
      padding: 35px;
      border-radius: 25px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      color: white;
    }

    .form-container h2{
      text-align: center;
      margin-bottom: 25px;
      font-size: 32px;
    }

    .input-box{
      margin-bottom: 20px;
    }

    .input-box input,
    .input-box textarea{
      width: 100%;
      padding: 14px;
      border: none;
      outline: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 15px;
    }

    .input-box input::placeholder,
    .input-box textarea::placeholder{
      color: rgba(255,255,255,0.7);
    }

    .input-box textarea{
      resize: none;
    }

    .submit-btn{
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg,#ff4ecd,#00ffd5);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .submit-btn:hover{
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .message{
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    /* ================= FOOTER ================= */

    .footer{
      width: 100%;
      padding: 18px;
      text-align: center;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.2);
      color: white;
      position: relative;
      z-index: 2;
    }

    /* ================= MOBILE RESPONSIVE ================= */

    @media (max-width:768px){

      .navbar{
        padding: 15px 20px;
      }

      .navbar img{
        width: 70px;
      }

      .nav-links{
        padding: 20px;
      }

      .main-content{
        padding: 120px 15px 40px;
      }

      .form-container{
        padding: 25px;
        border-radius: 20px;
      }

      .form-container h2{
        font-size: 28px;
      }

      .input-box input,
      .input-box textarea{
        padding: 12px;
        font-size: 14px;
      }

      .submit-btn{
        padding: 13px;
        font-size: 15px;
      }

      .circle1{
        width: 180px;
        height: 180px;
      }

      .circle2{
        width: 220px;
        height: 220px;
      }

    }

  </style>
</head>

<body>

  <!-- Navbar -->

  <header class="navbar">

    <img src="logo.png" alt="Logo">

    <div class="menu-toggle" id="mobile-menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </div>

    <nav>
      <ul class="nav-links" id="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

  </header>

  <!-- Background Glow -->

  <div class="background-circle circle1"></div>
  <div class="background-circle circle2"></div>

  <!-- Main Content -->

  <div class="main-content">

    <div class="form-container">

      <h2>Contact Us</h2>

      <form id="myForm">

        <div class="input-box">
          <input type="text" id="name" placeholder="Enter your name" required>
        </div>

        <div class="input-box">
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
          <textarea id="message" rows="4" placeholder="Write your message" required></textarea>
        </div>

        <button type="submit" class="submit-btn">
          Send Message
        </button>

        <div class="message" id="successMessage"></div>

      </form>

    </div>

  </div>

  <!-- Footer -->

  <footer class="footer">
    <div class="footer-text">
      © 2026 MyBrand. All rights reserved.
    </div>
  </footer>

  <script>

    // Form Submit

    const form = document.getElementById('myForm');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', function(event){

      event.preventDefault();

      const name = document.getElementById('name').value;

      successMessage.innerHTML =
      `✨ Thank you, ${name}! Your message has been sent successfully.`;

      form.reset();

    });

    // Mobile Menu

    const menuToggle = document.getElementById('mobile-menu');
    const navLinks = document.getElementById('nav-links');

    menuToggle.addEventListener('click', () => {

      navLinks.classList.toggle('active');

    });

  </script>

</body>
</html>
