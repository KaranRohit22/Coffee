<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Verification</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  padding:20px;

  background:
  linear-gradient(rgba(20,10,5,0.78),
  rgba(20,10,5,0.78)),
  url("back.jpg");

  background-size:cover;
  background-position:center;

  color:white;
}

/* ================= PAYMENT BOX ================= */

.payment-container {

  width:100%;

  max-width:500px;

  background:rgba(255,255,255,0.08);

  border:1px solid rgba(255,255,255,0.12);

  backdrop-filter:blur(14px);

  border-radius:24px;

  padding:35px;

  box-shadow:
  0 0 35px rgba(0,0,0,0.4);
}

.payment-title{

  text-align:center;

  font-size:34px;

  color:#ffcc80;

  margin-bottom:10px;
}

.payment-subtitle{

  text-align:center;

  color:#ddd;

  margin-bottom:30px;

  font-size:15px;
}

/* ================= INPUTS ================= */

.input-box{

  margin-bottom:22px;
}

.input-box label{

  display:block;

  margin-bottom:10px;

  color:#ffcc80;

  font-size:15px;
}

.input-box input{

  width:100%;

  padding:15px;

  border:none;

  outline:none;

  border-radius:14px;

  background:rgba(255,255,255,0.1);

  border:1px solid rgba(255,255,255,0.15);

  color:white;

  font-size:15px;

  transition:0.4s;
}

.input-box input:focus{

  border-color:#ffb347;

  box-shadow:
  0 0 18px rgba(255,179,71,0.5);

  background:rgba(255,255,255,0.15);
}

.input-box input::placeholder{
  color:#ccc;
}

/* ================= CARD ROW ================= */

.card-row{

  display:flex;

  gap:15px;
}

.card-row .input-box{
  flex:1;
}

/* ================= VERIFY BUTTON ================= */

.verify-btn{

  width:100%;

  padding:16px;

  border:none;

  border-radius:16px;

  background:
  linear-gradient(135deg,
  #ffb347,
  #ff5e62);

  color:white;

  font-size:18px;

  font-weight:bold;

  cursor:pointer;

  transition:0.4s;
}

.verify-btn:hover{

  transform:translateY(-3px);

  box-shadow:
  0 0 25px rgba(255,179,71,0.6);
}

/* ================= SUCCESS BOX ================= */

.success-box{

  display:none;

  text-align:center;

  margin-top:30px;

  padding:25px;

  border-radius:18px;

  background:rgba(255,255,255,0.08);

  animation:popup 0.5s ease;
}

.success-box i{

  font-size:55px;

  color:#4dff88;

  margin-bottom:15px;
}

.success-box h2{

  color:#ffcc80;

  margin-bottom:10px;
}

.success-box p{

  color:#ddd;

  margin-bottom:20px;
}

.home-btn{

  display:inline-block;

  padding:12px 24px;

  border-radius:12px;

  text-decoration:none;

  background:#ffb347;

  color:white;

  transition:0.3s;
}

.home-btn:hover {

  transform:translateY(-3px);
}

/* ================= ANIMATION ================= */

@keyframes popup{

  from{
    opacity:0;
    transform:scale(0.8);
  }

  to{
    opacity:1;
    transform:scale(1);
  }
}

/* ================= MOBILE ================= */

@media(max-width:600px){

  .payment-container{

    padding:25px;
  }

  .payment-title{

    font-size:28px;
  }

  .card-row{

    flex-direction:column;
  }

}

</style>

</head>

<body>

<div class="payment-container">

<h1 class="payment-title">
💳 Payment Verify
</h1>

<p class="payment-subtitle">
Secure your coffee order payment
</p>

<!-- FORM -->

<form id="paymentForm">

<div class="input-box">

<label>
Card Holder Name
</label>

<input type="text"
placeholder="Enter card holder name"
required>

</div>

<div class="input-box">

<label>
Card Number
</label>

<input type="text"
maxlength="16"
placeholder="1234 5678 9012 3456"
required>

</div>

<div class="card-row">

<div class="input-box">

<label>
Expiry Date
</label>

<input type="text"
placeholder="MM/YY"
required>

</div>

<div class="input-box">

<label>
CVV
</label>

<input type="password"
maxlength="3"
placeholder="123"
required>

</div>

</div>

<div class="input-box">

<label>
UPI ID (Optional)
</label>

<input type="text"
placeholder="example@upi" required>

</div>

<button type="submit"
class="verify-btn">

Verify Payment

</button>

</form>

<!-- SUCCESS -->

<div class="success-box"
id="successBox">

<i class="fa-solid fa-circle-check"></i>

<h2>
Payment Successful ☕
</h2>

<p>
Your coffee order has been verified successfully.
</p>

<a href="index.html"
class="home-btn">

Back To Home

</a>

</div>

</div>

<script>

/* ================= PAYMENT VERIFY ================= */

const paymentForm =
document.getElementById("paymentForm");

const successBox =
document.getElementById("successBox");

paymentForm.addEventListener(
"submit",
function(e){

e.preventDefault();

/* HIDE FORM */

paymentForm.style.display = "none";

/* SHOW SUCCESS */

successBox.style.display = "block";

/* CLEAR CART */

localStorage.removeItem("cart");

}
);

</script>

</body>
</html>
