<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Premium Coffee Menu</title>

<style>

/* ================= GLOBAL ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

/* ================= BODY ================= */

body{

  background:
  linear-gradient(rgba(15,10,5,0.78),
  rgba(15,10,5,0.78)),
  url("back.jpg");

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  min-height:100vh;

  padding:40px 20px;

  position:relative;
}

/* ================= IMAGE ================= */

img{
  width:100%;
  display:block;
}

/* ================= NAVBAR ================= */

.navbar{

  width:100%;

  padding:20px 8%;

  display:flex;

  justify-content:space-between;

  align-items:center;

  position:fixed;

  top:0;
  left:0;

  z-index:1000;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(12px);

  border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{

  font-size:32px;

  font-weight:bold;

  color:#ffe0b2;
}

/* ================= NAV LINKS ================= */

.nav-links{

  display:flex;

  align-items:center;

  gap:30px;

  list-style:none;
}

.nav-links a{

  text-decoration:none;

  color:white;

  font-size:18px;

  transition:0.3s;
}

.nav-links a:hover{

  color:#ffcc80;
}

/* ================= TOGGLE ================= */

.menu-toggle{

  width:30px;

  height:20px;

  display:none;

  flex-direction:column;

  justify-content:space-between;

  cursor:pointer;
}

.menu-toggle span{

  width:100%;

  height:4px;

  background:white;

  border-radius:10px;

  transition:0.4s;
}

.menu-toggle.active span:nth-child(1){

  transform:rotate(45deg)
  translate(7px,7px);
}

.menu-toggle.active span:nth-child(2){

  opacity:0;
}

.menu-toggle.active span:nth-child(3){

  transform:rotate(-45deg)
  translate(7px,-7px);
}

/* ================= GLOW ================= */

.circle{

  position:absolute;

  border-radius:50%;

  filter:blur(70px);

  opacity:0.45;

  animation:float 6s infinite alternate ease-in-out;

  z-index:0;
}

.circle1{

  width:250px;

  height:250px;

  background:#ff9800;

  top:5%;

  left:5%;
}

.circle2{

  width:280px;

  height:280px;

  background:#ff5722;

  bottom:5%;

  right:5%;
}

@keyframes float{

  from{
    transform:translateY(0px);
  }

  to{
    transform:translateY(30px);
  }

}

/* ================= SECTION ================= */

.menu-section{

  position:relative;

  z-index:2;

  width:100%;

  max-width:1200px;

  margin:auto;
}

.menu-title{

  text-align:center;

  font-size:55px;

  color:#fff3e0;

  margin-top:80px;

  margin-bottom:45px;
}

/* ================= GRID ================= */

.menu-container{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(240px,1fr));

  gap:30px;
}

/* ================= CARD ================= */

.menu-card{

  background:rgba(40,20,10,0.42);

  backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:25px;

  overflow:hidden;

  color:white;

  transition:0.4s;

  box-shadow:0 10px 25px rgba(0,0,0,0.35);

  opacity:0;

  transform:translateY(40px);
}

.menu-card.show{

  opacity:1;

  transform:translateY(0);
}

.menu-card:hover{

  transform:translateY(-10px);

  box-shadow:0 14px 30px
  rgba(0,0,0,0.45);
}

.menu-card img{

  height:250px;

  object-fit:cover;
}

.menu-card:hover img{

  transform:scale(1.05);
}

/* ================= CONTENT ================= */

.menu-content{

  padding:22px;

  text-align:center;
}

.menu-content h2{

  margin-bottom:10px;

  font-size:28px;

  color:#ffe0b2;
}

.price{

  display:block;

  color:#ffcc80;

  font-size:20px;

  margin-bottom:15px;
}

/* ================= BUTTON ================= */

.menu-btn{

  width:100%;

  padding:13px;

  border:none;

  border-radius:14px;

  background:linear-gradient(
  135deg,
  #8b4513,
  #d2691e
  );

  color:white;

  font-size:15px;

  font-weight:bold;

  cursor:pointer;

  transition:0.3s;
}

.menu-btn:hover{

  transform:scale(1.03);
}

/* ================= QUANTITY ================= */

.cart-controls{

  width:100%;
}

.qty-control{

  display:none;

  align-items:center;

  justify-content:center;

  gap:15px;

  margin-top:10px;

  background:rgba(255,255,255,0.08);

  padding:10px;

  border-radius:14px;
}

.qty-control button{

  width:35px;

  height:35px;

  border:none;

  border-radius:50%;

  background:#ffb347;

  color:white;

  font-size:20px;

  cursor:pointer;

  transition:0.3s;
}

.qty-control button:hover{

  transform:scale(1.1);
}

.qty-control span{

  font-size:20px;

  font-weight:bold;

  color:#fff;
}

/* ================= POPUP ================= */

#popup{

  position:fixed;

  top:100px;

  right:-400px;

  background:linear-gradient(
  135deg,
  #ffb347,
  #ff5e62
  );

  color:white;

  padding:18px 30px;

  border-radius:16px;

  font-size:18px;

  font-weight:bold;

  z-index:9999;

  transition:0.5s;
}

#popup.show{

  right:30px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .menu-toggle{
    display:flex;
  }

  .nav-links{

    position:absolute;

    top:80px;

    right:20px;

    width:220px;

    background:rgba(25,15,10,0.95);

    border-radius:20px;

    padding:25px;

    flex-direction:column;

    gap:20px;

    text-align:center;

    opacity:0;

    visibility:hidden;

    transform:translateY(-20px);

    transition:0.4s;
  }

  .nav-links.active{

    opacity:1;

    visibility:visible;

    transform:translateY(0px);
  }

  .menu-title{

    font-size:35px;
  }

  .menu-container{

    grid-template-columns:1fr;
  }

}

</style>

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">
☕ Fresh Coffee
</div>

<div class="menu-toggle"
id="menuToggle">

<span></span>
<span></span>
<span></span>

</div>

<ul class="nav-links"
id="navLinks">

<li><a href="#">Home</a></li>

<li><a href="#">Menu</a></li>

<li><a href="#">About</a></li>

<li><a href="#">Contact</a></li>

<li><a href="#">Review</a></li>

<li>
<a href="cart.html">

Cart (<span id="cartCount">0</span>)

</a>
</li>

</ul>

</nav>

</header>

<div class="circle circle1"></div>

<div class="circle circle2"></div>

<section class="menu-section">

<h1 class="menu-title">
Our Coffee Menu ☕
</h1>

<div class="menu-container">

<!-- CARD 1 -->

<div class="menu-card">

<img src="cap.jpg">

<div class="menu-content">

<h2>Cappuccino</h2>

<span class="price">$5.00</span>

<div class="cart-controls">

<button class="menu-btn"
id="btn-Cappuccino"

onclick="addToCart(
'Cappuccino',
5,
'cap.jpg'
)">

Order Now

</button>

<div class="qty-control"
id="qty-Cappuccino">

<button onclick="decreaseQty('Cappuccino')">

-

</button>

<span id="count-Cappuccino">

1

</span>

<button onclick="increaseQty('Cappuccino')">

+

</button>

</div>

</div>

</div>

</div>

<!-- CARD 2 -->

<div class="menu-card">

<img src="espresso.jpg">

<div class="menu-content">

<h2>Espresso</h2>

<span class="price">$4.00</span>

<div class="cart-controls">

<button class="menu-btn"
id="btn-Espresso"

onclick="addToCart(
'Espresso',
4,
'espresso.jpg'
)">

Order Now

</button>

<div class="qty-control"
id="qty-Espresso">

<button onclick="decreaseQty('Espresso')">

-

</button>

<span id="count-Espresso">

1

</span>

<button onclick="increaseQty('Espresso')">

+

</button>

</div>

</div>

</div>

</div>

<!-- CARD 3 -->

<div class="menu-card">

<img src="latte.jpg">

<div class="menu-content">

<h2>Latte</h2>

<span class="price">$6.00</span>

<div class="cart-controls">

<button class="menu-btn"
id="btn-Latte"

onclick="addToCart(
'Latte',
6,
'latte.jpg'
)">

Order Now

</button>

<div class="qty-control"
id="qty-Latte">

<button onclick="decreaseQty('Latte')">

-

</button>

<span id="count-Latte">

1

</span>

<button onclick="increaseQty('Latte')">

+

</button>

</div>

</div>

</div>

</div>

<!-- CARD 4 -->

<div class="menu-card">

<img src="cc.jpg">

<div class="menu-content">

<h2>Cold Coffee</h2>

<span class="price">$7.00</span>

<div class="cart-controls">

<button class="menu-btn"
id="btn-Cold Coffee"

onclick="addToCart(
'Cold Coffee',
7,
'cc.jpg'
)">

Order Now

</button>

<div class="qty-control"
id="qty-Cold Coffee">

<button onclick="decreaseQty('Cold Coffee')">

-

</button>

<span id="count-Cold Coffee">

1

</span>

<button onclick="increaseQty('Cold Coffee')">

+

</button>

</div>

</div>

</div>

</div>

</div>

</section>

<div id="popup">

🎉 Added to Cart ☕

</div>

<script>

/* ================= CARD ANIMATION ================= */

const cards =
document.querySelectorAll('.menu-card');

window.addEventListener('load',()=>{

  cards.forEach((card,index)=>{

    setTimeout(()=>{

      card.classList.add('show');

    }, index * 200);

  });

});

/* ================= MOBILE MENU ================= */

const menuToggle =
document.getElementById("menuToggle");

const navLinks =
document.getElementById("navLinks");

menuToggle.addEventListener("click",()=>{

  menuToggle.classList.toggle("active");

  navLinks.classList.toggle("active");

});

/* ================= ADD TO CART ================= */

function addToCart(name,price,image){

  let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

  const existingItem =
  cart.find(item => item.name === name);

  if(existingItem){

    existingItem.quantity += 1;

  }

  else{

    cart.push({

      name:name,

      price:price,

      image:image,

      quantity:1

    });

  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCartCount();

  document.getElementById(
  "btn-" + name
  ).style.display = "none";

  document.getElementById(
  "qty-" + name
  ).style.display = "flex";

  document.getElementById(
  "count-" + name
  ).innerText = getQuantity(name);

  const popup =
  document.getElementById("popup");

  popup.innerHTML =
  `🎉 ${name} added to cart ☕`;

  popup.classList.add("show");

  setTimeout(()=>{

    popup.classList.remove("show");

  },2000);

}

/* ================= INCREASE ================= */

function increaseQty(name){

  let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

  const item =
  cart.find(item => item.name === name);

  item.quantity++;

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  document.getElementById(
  "count-" + name
  ).innerText = item.quantity;

  updateCartCount();

}

/* ================= DECREASE ================= */

function decreaseQty(name){

  let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

  const item =
  cart.find(item => item.name === name);

  if(item.quantity > 1){

    item.quantity--;

    document.getElementById(
    "count-" + name
    ).innerText = item.quantity;

  }

  else{

    cart =
    cart.filter(
    i => i.name !== name
    );

    document.getElementById(
    "btn-" + name
    ).style.display = "block";

    document.getElementById(
    "qty-" + name
    ).style.display = "none";
  }

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCartCount();

}

/* ================= GET QUANTITY ================= */

function getQuantity(name){

  let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

  const item =
  cart.find(item => item.name === name);

  return item ? item.quantity : 1;

}

/* ================= CART COUNT ================= */

function updateCartCount(){

  let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

  document.getElementById("cartCount")
  .innerText = cart.length;

}

/* ================= PAGE LOAD ================= */

window.addEventListener("load",()=>{

  updateCartCount();

  let cart =
  JSON.parse(localStorage.getItem("cart")) || [];

  cart.forEach(item=>{

    const btn =
    document.getElementById(
    "btn-" + item.name
    );

    const qty =
    document.getElementById(
    "qty-" + item.name
    );

    const count =
    document.getElementById(
    "count-" + item.name
    );

    if(btn && qty && count){

      btn.style.display = "none";

      qty.style.display = "flex";

      count.innerText = item.quantity;

    }

  });

});

</script>

</body>
</html>
