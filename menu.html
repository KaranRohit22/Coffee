<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Coffee Menu</title>

<style>

/* ================= GLOBAL ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

html,body{
  width:100%;
  overflow-x:hidden;
}

/* ================= BODY ================= */

body{

  background:
  linear-gradient(rgba(15,10,5,0.78), rgba(15,10,5,0.78)),
  url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=1600&auto=format&fit=crop');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  min-height:100vh;
  padding:40px 20px;
  position:relative;
}

/* ================= IMAGE ================= */

img{
  width:100%;
  display:block;
}

/* ================= NAVBAR ================= */

.navbar{

  width:100%;

  padding:18px 8%;

  display:flex;
  justify-content:space-between;
  align-items:center;

  background:rgba(40,20,10,0.45);

  backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:18px;

  position:sticky;
  top:10px;

  z-index:1000;
}

.logo{
  font-size:32px;
  font-weight:bold;
  color:#ffe0b2;
}

.nav-links{
  display:flex;
  list-style:none;
  gap:30px;
}

.nav-links a{
  text-decoration:none;
  color:white;
  font-size:18px;
  transition:0.3s;
}

.nav-links a:hover{
  color:#ffcc80;
}

/* ================= BACKGROUND GLOW ================= */

.circle{
  position:absolute;
  border-radius:50%;
  filter:blur(70px);
  opacity:0.45;
  animation:float 6s infinite alternate ease-in-out;
  z-index:0;
}

.circle1{
  width:250px;
  height:250px;
  background:#ff9800;
  top:5%;
  left:5%;
}

.circle2{
  width:280px;
  height:280px;
  background:#ff5722;
  bottom:5%;
  right:5%;
}

@keyframes float{

  from{
    transform:translateY(0px);
  }

  to{
    transform:translateY(30px);
  }

}

/* ================= MENU SECTION ================= */

.menu-section{
  position:relative;
  z-index:2;

  width:100%;
  max-width:1200px;

  margin:auto;
}

.menu-title{

  text-align:center;

  font-size:55px;

  color:#fff3e0;

  margin-top:60px;
  margin-bottom:45px;

  line-height:1.3;

  text-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* ================= MENU GRID ================= */

.menu-container{

  width:100%;

  display:grid;

  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

  gap:30px;
}

/* ================= MENU CARD ================= */

.menu-card{

  background:rgba(40,20,10,0.42);

  backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:25px;

  overflow:hidden;

  color:white;

  transition:0.4s;

  box-shadow:0 10px 25px rgba(0,0,0,0.35);

  opacity:0;
  transform:translateY(40px);
}

.menu-card.show{
  opacity:1;
  transform:translateY(0);
}

.menu-card:hover{
  transform:translateY(-10px);
  box-shadow:0 14px 30px rgba(0,0,0,0.45);
}

/* ================= IMAGE ================= */

.menu-card img{

  width:100%;
  height:250px;

  object-fit:cover;

  transition:0.4s;
}

.menu-card:hover img{
  transform:scale(1.05);
}

/* ================= CONTENT ================= */

.menu-content{
  padding:22px;
  text-align:center;
}

.menu-content h2{

  margin-bottom:10px;

  font-size:28px;

  color:#ffe0b2;
}

.price{

  display:block;

  color:#ffcc80;

  font-size:20px;

  margin-bottom:15px;
}

/* ================= BUTTON ================= */

.menu-btn{

  width:100%;

  padding:13px;

  border:none;

  border-radius:14px;

  background:linear-gradient(135deg,#8b4513,#d2691e);

  color:white;

  font-size:15px;
  font-weight:bold;

  cursor:pointer;

  transition:0.3s;
}

.menu-btn:hover{

  transform:scale(1.03);

  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* ================= TABLET VIEW ================= */

@media screen and (max-width:768px){

  body{
    padding:20px 15px;
    background-attachment:scroll;
  }

  .navbar{
    flex-direction:column;
    gap:15px;
    padding:18px;
  }

  .nav-links{
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .menu-title{
    font-size:36px;
    margin-top:40px;
    margin-bottom:30px;
  }

  .menu-container{
    grid-template-columns:1fr;
    gap:20px;
  }

  .menu-card{
    border-radius:20px;
  }

  .menu-card img{
    height:220px;
  }

  .menu-content{
    padding:18px;
  }

  .menu-content h2{
    font-size:24px;
  }

  .price{
    font-size:18px;
  }

  .menu-btn{
    font-size:15px;
    padding:12px;
  }

  .circle1{
    width:140px;
    height:140px;
    left:-20px;
  }

  .circle2{
    width:160px;
    height:160px;
    right:-20px;
  }

}

/* ================= MOBILE VIEW ================= */

@media screen and (max-width:480px){

  body{
    padding:15px 10px;
  }

  .logo{
    font-size:24px;
  }

  .nav-links{
    gap:10px;
  }

  .nav-links a{
    font-size:15px;
  }

  .menu-title{
    font-size:28px;
    margin-bottom:25px;
  }

  .menu-card{
    border-radius:18px;
  }

  .menu-card img{
    height:190px;
  }

  .menu-content{
    padding:15px;
  }

  .menu-content h2{
    font-size:21px;
  }

  .price{
    font-size:16px;
  }

  .menu-btn{
    font-size:14px;
    padding:11px;
  }

}

</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<header>

<nav class="navbar">

<div class="logo">
☕ Fresh Coffee
</div>

<ul class="nav-links">

<!-- ================= BACKGROUND GLOW ================= -->

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<section class="menu-section">

<h1 class="menu-title">

</h1>

<div class="menu-container">

<!-- CARD 1 -->

<div class="menu-card">

<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=1200&auto=format&fit=crop" alt="Cappuccino">

<div class="menu-content">

<h2>Cappuccino</h2>

<span class="price">$5.00</span>

Order Now

</div>

<!-- CARD 2 -->

<div class="menu-card">

<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?q=80&w=1200&auto=format&fit=crop" alt="Espresso">

<div class="menu-content">

<h2>Espresso</h2>

<span class="price">$4.00</span>

<button class="menu-btn">
Order Now
</button>

</div>

</div>

<!-- CARD 3 -->

<div class="menu-card">

<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1200&auto=format&fit=crop" alt="Latte">

<div class="menu-content">

<h2>Latte</h2>

<!-- CARD 4 -->

<div class="menu-card">

</div>

<!-- ================= JAVASCRIPT ================= -->

<script>

const cards = document.querySelectorAll('.menu-card');

window.addEventListener('load', () => {

  cards.forEach((card,index) => {

    setTimeout(() => {

      card.classList.add('show');

    }, index * 200);

  });

});

</script>

</body>
</html>
