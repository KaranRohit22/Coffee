<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Fresh Coffee Cart</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{

  min-height:100vh;

  display:flex;

  flex-direction:column;

  background:
  linear-gradient(rgba(20,10,5,0.75),
  rgba(20,10,5,0.75)),
  url("back.jpg");

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  color:white;

  padding:30px;

  overflow-x:hidden;
}

/* ================= NAVBAR ================= */

.navbar{

  width:100%;

  height:80px;

  padding:0 8%;

  display:flex;

  justify-content:space-between;

  align-items:center;

  position:fixed;

  top:0;
  left:0;

  z-index:1000;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(12px);

  border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{

  font-size:28px;

  font-weight:700;

  color:#ffd59e;
}

/* ================= NAV LINKS ================= */

.nav-links{

  display:flex;

  align-items:center;

  gap:30px;

  list-style:none;
}

.nav-links a{

  text-decoration:none;

  color:white;

  font-size:17px;

  transition:0.3s;
}

.nav-links a:hover{

  color:#ffb347;
}

/* ================= TOGGLE ================= */

.menu-toggle{

  width:30px;

  height:22px;

  display:none;

  flex-direction:column;

  justify-content:space-between;

  cursor:pointer;
}

.menu-toggle span{

  width:100%;

  height:3px;

  background:white;

  border-radius:10px;

  transition:0.4s;
}

.menu-toggle.active span:nth-child(1){

  transform:rotate(45deg)
  translate(6px,6px);
}

.menu-toggle.active span:nth-child(2){

  opacity:0;
}

.menu-toggle.active span:nth-child(3){

  transform:rotate(-45deg)
  translate(7px,-7px);
}

/* ================= TITLE ================= */

h1{

  text-align:center;

  margin-top:110px;

  margin-bottom:30px;

  color:#ffcc80;

  font-size:42px;
}

/* ================= CART CONTAINER ================= */

.cart-container{

  width:100%;

  max-width:950px;

  margin:auto;

  background:rgba(255,255,255,0.08);

  padding:25px;

  border-radius:22px;

  backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,0.1);

  flex:1;
}

/* ================= CART ITEM ================= */

.cart-item{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:20px;

  margin-bottom:20px;

  border-radius:18px;

  background:rgba(255,255,255,0.08);

  transition:0.4s;
}

.cart-item:hover{

  transform:translateY(-5px);

  box-shadow:
  0 0 25px rgba(255,179,71,0.25);
}

.cart-left{

  display:flex;

  align-items:center;

  gap:18px;
}

.cart-img{

  width:100px;

  height:100px;

  object-fit:cover;

  border-radius:15px;
}

.cart-item h3{

  font-size:22px;

  margin-bottom:8px;
}

.cart-item p{

  color:#ddd;
}

.price{

  color:#ffcc80;

  font-size:22px;

  font-weight:bold;
}

/* ================= QUANTITY ================= */

.qty-box{

  display:flex;

  align-items:center;

  gap:12px;

  margin-top:15px;
}

.qty-btn{

  width:35px;

  height:35px;

  border:none;

  border-radius:50%;

  background:#ffb347;

  color:white;

  font-size:20px;

  cursor:pointer;

  transition:0.3s;
}

.qty-btn:hover{

  transform:scale(1.1);

  box-shadow:
  0 0 15px rgba(255,179,71,0.6);
}

.qty-number{

  font-size:18px;

  min-width:20px;

  text-align:center;
}

/* ================= REMOVE BUTTON ================= */

.remove-btn{

  margin-top:12px;

  padding:10px 16px;

  border:none;

  border-radius:12px;

  background:#ff5e62;

  color:white;

  cursor:pointer;

  transition:0.3s;
}

.remove-btn:hover{

  transform:scale(1.05);

  box-shadow:
  0 0 15px rgba(255,94,98,0.6);
}

/* ================= TOTAL ================= */

.total{

  margin-top:30px;

  text-align:right;

  font-size:30px;

  color:#ffcc80;

  font-weight:bold;
}

/* ================= OPTION ================= */

.option-box{

  margin-top:25px;

  display:flex;

  gap:30px;

  font-size:18px;
}

.option-box label{

  display:flex;

  align-items:center;

  gap:8px;
}

/* ================= PAYMENT ================= */

.payment-box{

  margin-top:30px;
}

.payment-box h3{

  margin-bottom:15px;

  color:#ffcc80;
}

.payment-select{

  width:100%;

  padding:15px;

  border:none;

  border-radius:14px;

  outline:none;

  background:rgba(255,255,255,0.1);

  color:white;

  font-size:16px;

  border:1px solid rgba(255,255,255,0.15);
}

.payment-select option{
  color:black;
}

/* ================= CHECKOUT BUTTON ================= */

.checkout-btn{

  width:100%;

  margin-top:30px;

  padding:16px;

  border:none;

  border-radius:16px;

  background:
  linear-gradient(135deg,
  #ffb347,
  #ff5e62);

  color:white;

  font-size:19px;

  font-weight:bold;

  cursor:pointer;

  transition:0.4s;
}

.checkout-btn:hover{

  transform:translateY(-3px);

  box-shadow:
  0 0 25px rgba(255,179,71,0.6);
}

/* ================= ORDER HISTORY ================= */

.history{

  margin-top:40px;
}

.history h2{

  margin-bottom:20px;

  color:#ffcc80;
}

/* ================= CLEAR HISTORY BUTTON ================= */

.clear-history-btn{

  margin-bottom:20px;

  padding:12px 22px;

  border:none;

  border-radius:14px;

  background:
  linear-gradient(135deg,
  #ff5e62,
  #ff9966);

  color:white;

  font-size:16px;

  font-weight:bold;

  cursor:pointer;

  transition:0.3s;
}

.clear-history-btn:hover{

  transform:translateY(-3px);

  box-shadow:
  0 0 20px rgba(255,94,98,0.6);
}
.history-card{

  background:rgba(255,255,255,0.08);

  padding:18px;

  border-radius:18px;

  margin-bottom:15px;

  border:1px solid rgba(255,255,255,0.08);
}

.history-card p{

  margin-bottom:8px;

  color:#ddd;
}

/* ================= EMPTY CART ================= */

.empty-cart{

  text-align:center;

  padding:50px 20px;
}

.empty-cart h2{

  font-size:34px;

  margin-bottom:12px;
}

.shop-btn{

  display:inline-block;

  margin-top:20px;

  padding:12px 25px;

  border-radius:12px;

  text-decoration:none;

  background:#ffb347;

  color:white;

  transition:0.3s;
}

.shop-btn:hover{

  transform:translateY(-3px);
}

/* ================= CELEBRATION ================= */

.celebration{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100vh;

  background:rgba(0,0,0,0.75);

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  z-index:99999;

  opacity:0;

  visibility:hidden;

  transition:0.5s;
}

.celebration.show{

  opacity:1;

  visibility:visible;
}

.success-box{

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(18px);

  padding:35px 45px;

  border-radius:25px;

  text-align:center;

  animation:popUp 0.7s ease;
}

.success-box h2{

  font-size:38px;

  color:#ffcc80;

  margin-bottom:12px;
}

.success-box p{

  font-size:18px;
}

.poppers{

  margin-top:40px;

  display:flex;

  gap:20px;

  flex-wrap:wrap;

  justify-content:center;
}

.poppers span{

  font-size:55px;

  animation:party 2s infinite ease-in-out;
}

@keyframes party{

  0%{
    transform:translateY(0px)
    rotate(0deg);
  }

  50%{
    transform:translateY(-30px)
    rotate(20deg);
  }

  100%{
    transform:translateY(0px)
    rotate(0deg);
  }
}

@keyframes popUp{

  0%{
    transform:scale(0.5);
    opacity:0;
  }

  100%{
    transform:scale(1);
    opacity:1;
  }
}

/* ================= FOOTER ================= */

.footer{

  width:100%;

  text-align:center;

  padding:25px;

  margin-top:auto;

  color:rgba(255,255,255,0.7);
}
/* ================= MOBILE ================= */

@media(max-width:768px){

  body{
    padding:15px;
  }

  .navbar{

    height:70px;

    padding:0 20px;
  }

  .logo{
    font-size:22px;
  }

  .menu-toggle{
    display:flex;
  }

  .nav-links{

    position:absolute;

    top:80px;
    right:-100%;

    width:220px;

    flex-direction:column;

    background:rgba(0,0,0,0.92);

    padding:25px;

    border-radius:18px;

    transition:0.4s;
  }

  .nav-links.active{
    right:20px;
  }

  h1{
    font-size:32px;
  }

  .cart-item{

    flex-direction:column;

    text-align:center;

    gap:20px;
  }

  .cart-left{
    flex-direction:column;
  }

  .option-box{
    flex-direction:column;
  }

  .total{
    text-align:center;
    font-size:25px;
  }

  .success-box{

    width:90%;

    padding:25px;
  }

  .success-box h2{
    font-size:28px;
  }

  .poppers span{
    font-size:40px;
  }

}

</style>

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">
☕ Fresh Coffee
</div>

<div class="menu-toggle"
id="menuToggle">

<span></span>
<span></span>
<span></span>

</div>

<ul class="nav-links"
id="navLinks">

<li><a href="index.html">Home</a></li>

<li><a href="menu.html">Menu</a></li>

<li><a href="about.html">About</a></li>

<li><a href="contact.html">Contact</a></li>

<li><a href="review.html">Review</a></li>

<li>
<a href="cart.html">
Cart (<span id="cartCount">0</span>)
</a>
</li>

</ul>

</nav>

</header>

<h1>
🛒 Your Cart
</h1>

<div class="cart-container">

<div id="cartItems"></div>

<div class="total"
id="totalPrice">

Total : ₹0

</div>

<div class="option-box">

<label>

<input type="radio"
name="type"
value="Dining"
checked>

Dining

</label>

<label>

<input type="radio"
name="type"
value="Delivery">

Delivery (+ ₹50)

</label>

</div>

<div class="payment-box">

<h3>
💳 Select Payment Method
</h3>

<select class="payment-select"
id="paymentMethod">

<option value="Cash On Delivery">
Cash On Delivery
</option>

<option value="UPI">
UPI
</option>

<option value="Credit Card">
Credit Card
</option>

<option value="Debit Card">
Debit Card
</option>

</select>

</div>

<button
class="checkout-btn"
id="checkoutBtn">

Proceed to Checkout

</button>

<div class="history">

<h2>
📜 Order History
</h2>

<button
class="clear-history-btn"
onclick="clearHistory()">

🗑 Clear History

</button>

<div id="historyContainer"></div>

</div>
<!-- ================= CELEBRATION ================= -->

<div class="celebration" id="celebration">

  <div class="success-box">

    <h2>
      🎉 Order Placed Successfully!
    </h2>

    <p>
      Your coffee is being prepared ☕
    </p>

  </div>

  <div class="poppers">

    <span>🎊</span>
    <span>🎉</span>
    <span>✨</span>
    <span>🎊</span>
    <span>🎉</span>
    <span>✨</span>

  </div>

</div>
</div>
<script>

/* ================= MOBILE MENU ================= */

const menuToggle =
document.getElementById("menuToggle");

const navLinks =
document.getElementById("navLinks");

menuToggle.onclick = ()=>{

  menuToggle.classList.toggle("active");

  navLinks.classList.toggle("active");
};

/* ================= LOAD DATA ================= */

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let orderHistory =
JSON.parse(localStorage.getItem("orderHistory")) || [];

const cartItems =
document.getElementById("cartItems");

const totalPrice =
document.getElementById("totalPrice");

const cartCount =
document.getElementById("cartCount");

const historyContainer =
document.getElementById("historyContainer");

/* ================= UPDATE CART ================= */

function updateCart(){

  cartItems.innerHTML = "";

  let grandTotal = 0;

  cartCount.innerText = cart.length;

  if(cart.length === 0){

    cartItems.innerHTML = `

    <div class="empty-cart">

      <h2>🛒 Cart is Empty</h2>

      <p>Add coffee from menu page</p>

      <a href="menu.html"
      class="shop-btn">

      Order Now

      </a>

    </div>

    `;

    totalPrice.innerHTML =
    "Total : ₹0";

    return;
  }

  cart.forEach((item,index)=>{

    let itemTotal =
    item.price * item.quantity;

    grandTotal += itemTotal;

    cartItems.innerHTML += `

    <div class="cart-item">

      <div class="cart-left">

        <img src="${item.image}"
        class="cart-img">

        <div>

          <h3>${item.name}</h3>

          <p>
          Price : ₹${item.price}
          </p>

          <div class="qty-box">

            <button
            class="qty-btn"
            onclick="decreaseQty(${index})">

            -

            </button>

            <span class="qty-number">

            ${item.quantity}

            </span>

            <button
            class="qty-btn"
            onclick="increaseQty(${index})">

            +

            </button>

          </div>

        </div>

      </div>

      <div>

        <div class="price">

          ₹${itemTotal}

        </div>

        <button
        class="remove-btn"
        onclick="removeItem(${index})">

        Remove

        </button>

      </div>

    </div>

    `;
  });

  const selectedType =
  document.querySelector(
  'input[name="type"]:checked'
  ).value;

  if(selectedType === "Delivery"){

    grandTotal += 50;
  }

  totalPrice.innerHTML =
  `Total : ₹${grandTotal}`;
}

/* ================= REMOVE ITEM ================= */

function removeItem(index){

  cart.splice(index,1);

  localStorage.setItem(
  "cart",
  JSON.stringify(cart)
  );

  updateCart();
}

/* ================= INCREASE ================= */

function increaseQty(index){

  cart[index].quantity++;

  localStorage.setItem(
  "cart",
  JSON.stringify(cart)
  );

  updateCart();
}

/* ================= DECREASE ================= */

function decreaseQty(index){

  if(cart[index].quantity > 1){

    cart[index].quantity--;

  }else{

    cart.splice(index,1);
  }

  localStorage.setItem(
  "cart",
  JSON.stringify(cart)
  );

  updateCart();
}

/* ================= DELIVERY ================= */

document.querySelectorAll(
'input[name="type"]'
).forEach((radio)=>{

  radio.addEventListener(
  "change",
  updateCart
  );

});


/* ================= CHECKOUT ================= */

document.getElementById(
"checkoutBtn"
).onclick = ()=>{

  if(cart.length === 0){

    return;
  }

  /* ORDER TYPE */

  const orderType =
  document.querySelector(
  'input[name="type"]:checked'
  ).value;

  /* PAYMENT METHOD */

  const paymentMethod =
  document.getElementById(
  "paymentMethod"
  ).value;

  /* TOTAL */

  let total =
  totalPrice.innerText;

  /* ORDER DATA */

  const orderData = {

    items:cart,

    type:orderType,

    payment:paymentMethod,

    total:total,

    date:new Date().toLocaleString()
  };

  /* SAVE CURRENT ORDER */

  localStorage.setItem(
  "currentOrder",
  JSON.stringify(orderData)
  );

  /* ================= PAYMENT REDIRECT ================= */

  if(paymentMethod === "UPI"){

    window.location.href =
    "upi.html";
  }

  else if(
  paymentMethod === "Credit Card"
  ){

    window.location.href =
    "creditcard.html";
  }

  else if(
  paymentMethod === "Debit Card"
  ){

    window.location.href =
    "debit.html";
  }

  else{

    /* CASH ON DELIVERY */

    orderHistory.unshift(orderData);

    localStorage.setItem(
    "orderHistory",
    JSON.stringify(orderHistory)
    );

    /* SHOW CELEBRATION */

    document.getElementById(
    "celebration"
    ).classList.add("show");

    /* CLEAR CART */

    localStorage.removeItem("cart");

    cart = [];

    updateCart();

    showHistory();

    /* HIDE CELEBRATION */

    setTimeout(()=>{

      document.getElementById(
      "celebration"
      ).classList.remove("show");

    },3000);

  }

};
/* ================= ORDER HISTORY ================= */

function showHistory(){

  historyContainer.innerHTML = "";

  if(orderHistory.length === 0){

    historyContainer.innerHTML =
    "<p>No Orders Yet</p>";

    return;
  }

  orderHistory.forEach((order)=>{

    let itemsHTML = "";

    order.items.forEach((item)=>{

      itemsHTML += `

      <p>

      ${item.name}
      × ${item.quantity}

      </p>

      `;
    });

    historyContainer.innerHTML += `

    <div class="history-card">

      <p>
      📅 ${order.date}
      </p>

      <p>
      🍽 ${order.type}
      </p>

      <p>
      💳 ${order.payment}
      </p>

      <p>
      💰 ${order.total}
      </p>

      ${itemsHTML}

    </div>

    `;
  });
}


/* ================= CLEAR HISTORY ================= */

function clearHistory(){

  if(orderHistory.length === 0){

    return;
  }

  /* CLEAR HISTORY */

  localStorage.removeItem(
  "orderHistory"
  );

  orderHistory = [];

  showHistory();

  /* CREATE CELEBRATION */

  const celebration =
  document.createElement("div");

  celebration.className =
  "celebration show";

  celebration.innerHTML = `

  <div class="success-box">

    <h2>
      🎉 History Cleared!
    </h2>

    <p>
      All order history removed successfully ☕
    </p>

  </div>

  <div class="poppers">

    <span>🎊</span>
    <span>🎉</span>
    <span>✨</span>
    <span>🎊</span>
    <span>🎉</span>
    <span>✨</span>

  </div>

  `;

  document.body.appendChild(
  celebration
  );

  /* REMOVE AFTER 3 SEC */

  setTimeout(()=>{

    celebration.remove();

  },3000);

}

updateCart();

showHistory();

</script>

<footer class="footer">

© 2026 Fresh Coffee |
All Rights Reserved

</footer>

</body>
</html>
